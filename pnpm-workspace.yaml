packages:
  - 'packages/*'

catalog:
  '@vitejs/plugin-vue': ^6.0.6
  '@vitejs/plugin-vue-jsx': ^5.1.5
  '@vueuse/core': ^14.3.0
  typescript: ^6.0.3
  vite: ^8.0.13
  vue: ^3.5.34
  'es-toolkit': ^1.46.1
  'type-fest': ^5.6.0

catalogs:
  astro:
    vite: ~7.3.3
overrides:
  astro@<6.1.10: ^6.1.10
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  braces@<3.0.3: '>=3.0.3'
  devalue@>=5.6.3 <=5.8.0: ^5.8.1
  fast-uri@<=3.1.0: '>=3.1.1'
  fast-uri@<=3.1.1: '>=3.1.2'
  flatted@<3.4.0: '>=3.4.0'
  flatted@<=3.4.1: '>=3.4.2'
  micromatch@<4.0.8: '>=4.0.8'
  postcss@<8.4.31: '>=8.4.31'
  postcss@<8.5.10: '>=8.5.10'
  trim-newlines@<3.0.1: '>=3.0.1'
  trim@<0.0.3: '>=0.0.3'
  yargs-parser@>=6.0.0 <13.1.2: '>=13.1.2'
shellEmulator: true
shamefullyHoist: true
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  esbuild: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
  vue-inbrowser-compiler-demi: true
minimumReleaseAgeExclude:
  - astro@6.1.10
  - devalue@5.8.1
