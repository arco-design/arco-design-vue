packages:
  - 'packages/*'

catalog:
  '@vitejs/plugin-vue': ^6.0.7
  '@vitejs/plugin-vue-jsx': ^5.1.5
  '@vueuse/core': ^14.3.0
  typescript: ^6.0.3
  vite: ^8.0.14
  vue: ^3.5.34
  'es-toolkit': ^1.47.0
  'type-fest': ^5.6.0
  oxlint: ^1.67.0
  oxfmt: ^0.52.0
  'vite-plus': ^0.1.23

catalogs:
  astro:
    vite: ~8.0.14
overrides:
  astro@<6.1.10: ^6.1.10
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  braces@<3.0.3: '>=3.0.3'
  devalue@>=5.6.3 <=5.8.0: ^5.8.1
  fast-uri@<=3.1.0: '>=3.1.1'
  fast-uri@<=3.1.1: '>=3.1.2'
  flatted@<3.4.0: '>=3.4.0'
  flatted@<=3.4.1: '>=3.4.2'
  js-cookie@<=3.0.5: ^3.0.6
  micromatch@<4.0.8: '>=4.0.8'
  postcss@<8.4.31: '>=8.4.31'
  postcss@<8.5.10: '>=8.5.10'
  trim-newlines@<3.0.1: '>=3.0.1'
  trim@<0.0.3: '>=0.0.3'
  ws@>=8.0.0 <8.20.1: ^8.20.1
  yargs-parser@>=6.0.0 <13.1.2: '>=13.1.2'
shellEmulator: true
shamefullyHoist: true
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  esbuild: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
  vue-inbrowser-compiler-demi: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@oxc-project/*'
  - '@oxfmt/*'
  - '@oxlint/*'
  - '@voidzero-dev/*'
  - oxfmt
  - oxlint
  - vite-plus
  - astro@6.1.10
  - devalue@5.8.1
  - brace-expansion@5.0.6
  - ws@8.20.1
  - js-cookie@3.0.6
trustLockfile: true
