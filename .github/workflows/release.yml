name: Release web-vue

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      - netlify.toml
      - .npmrc
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/sd-vue-docs/**
      - packages/web-vue/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          registry-url: 'https://registry.npmjs.org'
          scope: '@sdata'

      - name: Install dependencies
        run: |
          corepack enable
          node -v
          pnpm -v
          pnpm run install:ci

      - name: Build release package
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: pnpm --filter @sdata/web-vue run build

      - name: Release web-vue
        working-directory: packages/web-vue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Trigger Netlify docs build hook
        if: success()
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          test -n "$NETLIFY_BUILD_HOOK_URL" || { echo 'Missing NETLIFY_BUILD_HOOK_URL secret'; exit 1; }
          curl -X POST -fsS "$NETLIFY_BUILD_HOOK_URL"

      - name: Show error
        if: failure()
        run: |
          pnpm vp run --last-details
